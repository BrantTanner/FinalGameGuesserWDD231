
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Home page of video game guesser game">
    <title>Character Guesser</title>
    <link rel="stylesheet" href="characterGuesser.css">
    <script src="characterGuesser.js" type="module" defer></script>
</head>

<body>
    <header>
        <div class="topnav">
            <div class="topLinks">
                <img src="../assets/images/logo.png" alt="logo">
                <a href="../homepage/index.html" class="active">Home</a>
                <a href="../rules.html">Rules</a>
                <a href="../creditsPage/credits.html">Credits</a>
            </div>

    </header>
    
    <main>
        <div>
            <section class="characterAndHint">
                <img src="#characterImg" alt="Picture of character">
                <button type="button" id="hintBtn" onclick="showHint()">View Hint!</button>
                <p class="hint">insert hint here</p>
            </section>
            
            <section class="playerInput">
                <form>
                    <label for="playerGuess">Your Guess:</label>
                    <input type="text" id="playerGuess" name="playerGuess">
                
                </form>

            </section>
        </div>

<!-- modal area for guesses -->
        <div id="gameModal" class ="modal">
            <div class="modalContent">
                <p id="modalMessage"></p>
                <button type="button" id="closeModal">Next</button>
            </div>
        </div>
        
    </main>
    <footer>
        <a class="contactUs" href="../contactUs/contactUs.html">Contact Us</a>

        <section class="socialMedia">
            <p>Follow Us:</p>

            <a href="../contactUs/contactUs.html">
                <img src="../assets/images/instagram.png" alt="instagram logo">
            </a>
            <a href="../contactUs/contactUs.html">
                <img src="../assets/images/x.png" alt="X logo">
            </a>
            <a href="../contactUs/contactUs.html">
                <img src="../assets/images/youtube.png" alt="Youtube Logo">
            </a>
        </section>
    </footer> 
</body>
</html>
